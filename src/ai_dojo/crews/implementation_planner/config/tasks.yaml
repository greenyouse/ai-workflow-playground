issue_analysis_task:
  description: >
    Analyze the following issue: 

    {idea}
    
    Classify it as a bug, feature request, or refactor. Identify 
    the likely technical requirements, possible system impacts, 
    unknowns, and the types of code or documentation context needed 
    before implementation.
  expected_output: >
    A structured issue analysis containing: issue type, problem summary,
    likely requirements, impacted areas, possible side effects, open
    questions, and a prioritized retrieval strategy for relevant code and
    documentation context.
  agent: planner

implementation_drafting_task:
  description: >
    Using the issue analysis and structured technical context, propose a
    practical solution for the given idea:
    {idea}

    Draft the implementation approach, including proposed code changes, 
    relevant tests, and migration or rollout notes only if they are necessary.

    Here is the repo context:
    {repo_context}

    Local files referenced
    {collected_files}

  expected_output: >
    A draft implementation package containing: solution summary, proposed code
    changes or pseudocode, test plan and sample test cases, assumptions,
    affected components, and any required migration or rollout notes.
  agent: implementer

draft_review_task:
  description: >
    Critically evaluate the following implementation draft for {idea}.

    Check for logic errors, missing edge cases, security concerns,
    architectural misalignment, unsupported assumptions, and inadequate test
    coverage. Confirm that the proposed implementation actually addresses the
    original issue without unnecessary scope expansion.

    Draft implementation:
    {implementation_plan}

    Collected files:
    {collected_files}

    Repository context:
    {repo_context}
  expected_output: >
    Output a clear "approved: true" or "approved: false" for whether
    the implementation passed the review.
  agent: reviewer

final_draft_synthesis_task:
  description: >
    Consolidate the issue analysis, technical context, implementation draft,
    and review feedback into a final Markdown implementation brief for
    {idea}. Present it in a form a human developer can act on immediately,
    while preserving important caveats, assumptions, and unresolved questions.

    References these details from earlier steps:
    - Implementation draft: {implementation_plan}
    - Review feedback: {review_feedback}

  expected_output: >
    A clean Markdown implementation brief containing: issue summary, proposed
    solution, affected areas, implementation notes, test plan, key risks,
    required revisions, and any open questions for human review.
  agent: synthesizer
  output_file: 'implementation_draft.md'

revise_issue_task:
  description: >
    Revise the implementation draft for this given idea using the reviewer 
    feedback.

    Here is the idea:
    {idea}

    Update the proposed solution, tests, and technical notes to address the
    most important critiques where possible. Preserve any unresolved risks,
    assumptions, or open questions if they cannot be fully resolved from the
    available context.

    Use this repository context to gather the technical context needed to
    resolve the issue. Ground all findings in the repository context, do not
    invent any missing context.

    Retrieve relevant code snippets, API signatures, documentation,
    dependency relationships, and prior related implementation patterns
    when available.

    The next sections will give metadata to help with the analysis. Each section
    is prefixed with "Here is the", for example "Here is the repo context".

    Here is the draft implementation:
    {implementation_plan}

    Here is the draft feedback:
    {review_feedback}

    Here is the repo context:
    {repo_context}

    Here is the repo context file collection:
    {collected_files}
  expected_output: >
    A revised implementation draft containing: updated solution summary,
    revised code changes or pseudocode, updated test plan, addressed review
    items, and a short list of any unresolved concerns that still require
    human judgment.
  agent: implementer
